name: azamov_second_me
description: AZAMOV Second Me - AI-powered self-improvement app where users communicate with their future selves.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.1
  firebase_analytics: ^11.4.1
  firebase_crashlytics: ^4.3.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # AI
  http: ^1.2.2

  # UI - Apple iOS 27 Liquid Glass Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  modal_bottom_sheet: ^3.0.0
  badges: ^3.1.2
  intl: ^0.20.2
  flutter_markdown: ^0.7.6
  glassmorphism: ^3.0.0
  blur: ^3.1.0
  avatar_glow: ^3.0.1

  # Auth
  google_sign_in: ^6.2.2

  # Utils
  equatable: ^2.0.7
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3

  # Voice Input
  speech_to_text: ^7.0.1

  # Local Notifications
  flutter_local_notifications: ^22.0.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.1
  lottie: ^3.3.3
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2
  json_serializable: ^6.9.2

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/